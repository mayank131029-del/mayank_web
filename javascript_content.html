        <link rel="stylesheet" href="style.css">
        <style>
            * {
                margin: 0px;
                padding: 0px;
                font-family: poppins;
            }

          

            html {
                background: #e0e1dd;
            }

            .syne-font {
                color: #0d1b2a;
                font-family: 'Syne', sans-serif;
            }

            main a {
                width: 30%;
                text-decoration: none;
                transition: all 0.2s ease-in-out;
            }



            main {
                grid-template-columns: repeat(3, 1fr);
                padding: 50px 30px;
                box-sizing: border-box;
                flex-wrap: wrap;
                gap: 35px;
                width: 80vw;
                margin: 0px auto;
            }

            .heading1 {
                color: #181e2e;
                font-size: 40px;
                text-align: center;
            }


            #alert {
                background-image: url(images/alert&prompt.png);
            }
            #POPUP {
                background-image: url(images/popup.png);
            }
            #calculator {
                background-image: url(images/functions.png);
            }
            #colorchange {
                background-image: url(images/random.png);
            }
            #table_generator {
                background-image: url(images/for\ loop.png);
            }


            .web-content-card {
                width: 100%;
                background-size: cover;
                background-position: center center;
                background-repeat: no-repeat;
                aspect-ratio: 16/11;
                border-radius: 22px 15px 22px 15px;
                transition: all 0.2s ease-in-out;
            }

            .web-content-card:hover {
                transform: translateY(-5px) scale(1.01);
            }


            .web-content-card h2 {
                margin-bottom: 10px;
                color: white;

            }

            .overlay {
                align-items: end;
                border-radius: 30px 15px 30px 15px;

                width: 100%;
                height: 100%;
                background: linear-gradient(to top, #00000085, #feb47b00);
            }

            .back {
                width: 85%;
                margin: 5px auto;
            }



            #js {
                border-radius: 30px;
                background-color: brown;
                padding: 12px 30px;
            }

            @media (max-width:880px) and (min-width:650px) {

                main a {
                    width: 45%;
                    text-decoration: none;
                }
            }

            @media (max-width:650px) {
                main {
                    width: 90%;
                }

                main a {
                    width: 100%;
                    text-decoration: none;
                }
            }
        </style>
