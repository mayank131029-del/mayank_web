<body>
    <div class="back"><a href="web_development.html"> &larrhk; back</a></div>
    
        <main>
            <h1 class="heading">Using Date() Function in JavaScript.</h1>
            <h2>Current Time is : <span id="clock"></span>
        </h2>
            <h2>Current Date is : <span id="date"></span>
        </h2>
        </main>


    



    <script>
        let clock = document.getElementById("clock")
        let date = document.getElementById("date")
        let full_time
        let time = new Date()
        date.innerHTML = `${time.getDate()}/${time.getMonth()}/${time.getUTCFullYear()}`
        
        setInterval(() => {
            let time = new Date()
             full_time = `${time.getHours()}:${time.getMinutes()}:${time.getSeconds()}`
                clock.innerHTML = full_time
        }, 1000);
        


        

    </script>

</body>
