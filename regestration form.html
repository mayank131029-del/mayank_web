<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="form.css">
</head>
<header>

    </header>

<body>
    <div class="back2top"></div>
    <div class="cursor"></div>
    <main class="flex">
        <div class="back"><a href="web_development.html"> &larrhk; back</a></div>
        <form action="" method="post">
            <h2>Sign Up</h2>
            <section class="flex">
                <label for="Name">First Name</label>
                <input type="text" placeholder="Enter First Name" id="Name" required>
            </section>
            <section class="flex">
                <label for="last name">Last Name</label>
                <input type="text" placeholder="Enter Last Name" id="last name" required>
            </section>
            <section class="flex">
                <label for="mobile">Mobile</label>
                <input type="tel" placeholder="Enter Mobile Number" id="mobile" required>
            </section>
            <section class="flex">
                <label for="gender">Gender</label>
                <div class="radio-box">
                    <div>
                        <input type="radio" id="mobile" name="gender" value="male" required> Male
                    </div>
                    <div>
                        <input type="radio" id="mobile" name="gender" value="female" required> Female
                    </div>
                    <div>
                        <input type="radio" id="mobile" name="gender" value="other" required> Others
                    </div>
                </div>
            </section>
            <section class="flex">
                <label for="email">Email</label>
                <input type="email" placeholder="Enter Email" id="email" required>
            </section>
            <section class="flex btns">
                <input type="submit" value="Sign up" class="submit-btn">
                <input type="reset" value="clear" class="clear-btn">
            </section>

            <p>Have u a account? <a href="login form.html">Click here</a></p>
        </form>

    </main>


</body>

<footer></footer>
<script src="script.js"></script>
</html>
