<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Validation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        main {
            height: 70vh;
            justify-content: center;
            align-items: center;
        }

        section {
            flex-direction: column;
            gap: 20px;
            border-radius: 15px;
            width: 50%;
            padding: 30px;
            height: 50%;
            background-color: rgb(235, 235, 235);
            justify-content: center;
            align-items: center;
        }

        .dwnbtn {
            width: 40%;
            padding: 5px 10px;
            border-radius: 5px;
            border: none;
            background-color: rgb(200, 183, 250);
            cursor: none;
            color: white;
        }

        .next {
            color: white;
            cursor: pointer;
            border: none;
            background-color: rgb(14, 20, 194);
            width: 100%;
            padding: 5px 10px;
            border-radius: 5px;

        }

        .dwnbtn a {
            color: white;
            font-weight: 500;
            display: block;
            width: 100%;
            height: 100%;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-8px);
            }

            80% {
                transform: translateX(8px);
            }
        }

        .shake {
            animation: shake 0.3s;
        }

        section div {
            align-items: flex-start;
            justify-content: flex-start;
            gap: 10px;
            width: 70%;
            flex-direction: column;
        }

        input {
            padding: 3px 8px;
            border-radius: 5px;
            border: 2px solid gray;
            /* font-size: 18px; */
            width: 100%;
        }

        .active1 {
            cursor: pointer;
            background: #1db954;
            color: white;
            transition: 0.2s all;

        }

        .active1:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(29, 185, 84, 0.3);
        }

        .wrong {
            color: red;
            font-size: 14px;
            text-align: right;
            align-self: flex-end;
        }

        .correct {
            color: green;
        }

        #attempts {
            text-align: center;
        }

        .ad {
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
        }

        .ad img {
            width: 50%;
        }

        .popup_box {
            display: none;
            top: 0px;
            position: fixed;
            z-index: 99999;
            align-items: center;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            background-color: #636363bd;
        }

        .popup {
            flex-direction: column;
            background: rgb(233, 225, 255);
            width: 40%;
            gap: 25px;
            padding: 35px 50px 50px 50px;
            border-radius: 18px;
        }


        .popup_content {
            gap: 10px;
            flex-direction: column;
            align-items: center;
        }

        .popup p {
            cursor: pointer;
            font-size: 19px;
            text-align: right;
        }

        .popup_content h5 {
            font-size: 25px;
            text-align: center;
        }

        .popup_content h1 {
            text-align: center;
            font-size: 55px;
            font-weight: 700;
            color: #26263f;
        }

        .buttons button {

            border: none;
            padding: 12px 22px;
            background: #ff3e7f;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .buttons button:hover {
            background: #e62f6d;
            transform: translateY(-3px);
        }

        .buttons {
            gap: 10px;
        }

        /* .hide_popup {
            display: none;
        } */
        .bg img{
            width: 100%;
        }

        @media (max-width: 650px) {

            section {
                width: 90%;
            }

            section div {
                width: 100%;
            }
              .buttons {
                flex-direction: column;
            }

            .popup {
                width: 90%;
            }
        }
    </style>
</head>
<header></header>

<body>

    <main class="flex">
        <section class="flex">
            <div class="flex">
                <label for="pass">Enter Password for downlaod file</label>
                <input placeholder="Enter the Password" id="pass" class="password" type="password">
                <button class="next" id="next">Next</button>
                <p class="wrong" id="wrong"></p>
            </div>
            <button id="btn" class="dwnbtn">
                </a>Downlaod
            </button>
            <p id="attempts">3 attempts left
            </p>
        </section>
    </main>



    <div class="popup_box flex unclickable" id="ad">
        <div class="popup flex">
            <p class="close_popup">x</p>
            <div class="popup_content flex">
                <h5>Check Out now & Receive</h5>
                <h1>10% OFF</h1>
                <h5>your first Order</h5>

            </div>
            <div class="buttons flex">
                <button>Your Email Address</button>
                <button>Get my 10% off</button>
            </div>
        </div>
    </div>


</body>


<footer></footer>

<script>
    let wrong = document.getElementById("wrong")
    let next = document.getElementById("next")
    let input = document.getElementById("pass")
    let btn = document.getElementById("btn")
    let att = document.getElementById("attempts")
    let password = "spider"
    let count = 3



    next.addEventListener("click", () => {
        if (input.value === "") {
            alert("Please Enter the Password")
        }
        else if (input.value !== password) {
            wrong.innerHTML = "Wrong Password, Try Again."
            wrong.classList.add("shake")
            wrong.addEventListener("animationend", () => {
                wrong.classList.remove("shake")
            })

            count--
            att.innerHTML = `${count} attempts left`

            if (count == 0) {

                att.innerHTML = "Attpemps are over, You can't donwload File"
                btn.remove()
            }

        }
        else if (input.value === password) {
            wrong.classList.add("correct")
            wrong.innerHTML = "Correct Password!"
            btn.classList.add("active1")
            btn.innerHTML = `<a href="media/download.psd">Download</a>`
            att.innerHTML = "Click on above button for downlaod the file"
        }
        console.log(count);

    })


    let ad = document.getElementById("ad")
    let itime = 0
    function counter() {
        itime++
        // console.log(itime)
        t = setTimeout(() => {
            counter()
        }, 1000);
        if (itime >= 15) {
            ad.style.display = "flex"
        }

    }
    counter()

    function resettimer() {
        clearInterval(t)
        itime=0
        counter()

    }
    document.addEventListener("mousemove",()=>{
        resettimer()
    })
    document.addEventListener("keydown",()=>{
        resettimer()
    })

var popup_box = document.querySelector(".popup_box")
        var closex = document.querySelector(".close_popup")
        closex.addEventListener("click", function () {
            popup_box.style.display = "none"
        })


</script>

<script src="script.js"></script>

</html>
