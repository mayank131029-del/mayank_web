<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Validation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
        main {
            height: 70vh;
            justify-content: center;
            align-items: center;
        }

        section {
            flex-direction: column;
            gap: 20px;
            border-radius: 15px;
            width: 50%;
            padding: 30px;
            height: 50%;
            background-color: rgb(235, 235, 235);
            justify-content: center;
            align-items: center;
        }

        .dwnbtn {
            width: 40%;
            padding: 5px 10px;
            border-radius: 5px;
            border: none;
            background-color: rgb(200, 183, 250);
            cursor: none;
            color: white;
        }

        .next {
            color: white;
            cursor: pointer;
            border: none;
            background-color: rgb(14, 20, 194);
            width: 100%;
            padding: 5px 10px;
            border-radius: 5px;

        }

        .dwnbtn a {
            color: white;
            font-weight: 500;
            display: block;
            width: 100%;
            height: 100%;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-8px);
            }

            80% {
                transform: translateX(8px);
            }
        }

        .shake {
            animation: shake 0.3s;
        }

        section div {
            align-items: flex-start;
            justify-content: flex-start;
            gap: 10px;
            width: 70%;
            flex-direction: column;
        }

        input {
            padding: 3px 8px; 
            border-radius: 5px;
            border: 2px solid gray;
            /* font-size: 18px; */
            width: 100%;
        }

        .active1 {
            cursor: pointer;
            background: #1db954;
            color: white;
            transition: 0.2s all;

        }

        .active1:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(29, 185, 84, 0.3);
        }

        .wrong {
            color: red;
            font-size: 14px;
            text-align: right;
            align-self: flex-end;
        }

        .correct {
            color: green;
        }
        #attempts{
            text-align: center;
        }

        @media (max-width: 650px) {

            section {
                width: 90%;
            }

            section div {
                width: 100%;
            }
        }
    </style>
</head>
<header></header>

<body>

    <main class="flex">
        <section class="flex">
            <div class="flex">
                <label for="pass">Enter Password for downlaod file</label>
                <input placeholder="Enter the Password" id="pass" class="password" type="password">
                <button class="next" id="next">Next</button>
                <p class="wrong" id="wrong"></p>
            </div>
            <button id="btn" class="dwnbtn">
                </a>Downlaod
            </button>
            <p id="attempts">3 attempts left
            </p>
        </section>
    </main>

</body>


<footer></footer>

<script>
    let wrong = document.getElementById("wrong")
    let next = document.getElementById("next")
    let input = document.getElementById("pass")
    let btn = document.getElementById("btn")
    let att = document.getElementById("attempts")
    let password = "spider"
    let count = 3



    next.addEventListener("click", () => {
        if (input.value === "") {
            alert("Please Enter the Password")
        }
        else if (input.value !== password) {
            wrong.innerHTML = "Wrong Password, Try Again."
            wrong.classList.add("shake")
            wrong.addEventListener("animationend", () => {
                wrong.classList.remove("shake")
            })

            count--
            att.innerHTML = `${count} attempts left`

            if (count == 0) {

                att.innerHTML = "Attpemps are over, You can't donwload File"
                btn.remove()
            }

        }
        else if (input.value === password) {
            wrong.classList.add("correct")
            wrong.innerHTML = "Correct Password!"
            btn.classList.add("active1")
            btn.innerHTML = `<a href="media/download.psd">Download</a>`
            att.innerHTML = "Click on above button for downlaod the file"
        }
        console.log(count);

    })

</script>

<script src="script.js"></script>

</html>
