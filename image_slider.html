<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">



    <style>
        main {
            overflow: hidden;
            width: 50vw;
            border-radius: 10px;
            background-color: rgb(238, 239, 255);
            color: #0d1b2a;
            margin: 20px auto;
        }

        .image_box {
            display: flex;
            margin-right: 50px;
        }

        .images {
            margin: 0;
            width: 50vw;

        }

        .input_container {
            text-align: center;
        }
    </style>



</head>

<a href="#top">
    <div class="back2top"></div>
</a>
<header>

</header>


<body>
    <div class="back"><a href="web_development.html"> &larrhk; back</a></div>

    <main>

        <div class="image_box fex" id="images_box">
            <img src="images/banner1.webp" alt="" class="images">
            <img src="images/banner2.webp" alt="" class="images">
            <img src="images/banner3.webp" alt="" class="images">
            <img src="images/banner4.webp" alt="" class="images">
            <img src="images/banner5.webp" alt="" class="images">
        </div>

    </main>
    <div class="input_container">
        <input type="range" min="0" id="slider">
    </div>

    <script>
        let viewportWidth = window.innerWidth;
        console.log(viewportWidth);
        let images = document.getElementById("images_box")
        let slider = document.getElementById("slider")
        slider.max = (viewportWidth / 2) * 4

        slider.addEventListener("input", () => {
            images.style.marginLeft = -slider.value + "px"
        })

    </script>

</body>



<footer></footer>
