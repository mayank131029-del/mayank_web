<! doctype html>
    <html>


    <head>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Web Content</title>
        <link rel="stylesheet" href="style.css">
        <style>
            * {
                margin: 0px;
                padding: 0px;
                font-family: poppins;
            }



            html {
                background: #e0e1dd;
            }

            .syne-font {
                color: #0d1b2a;
                font-family: 'Syne', sans-serif;
            }

            main a {
                width: 30%;
                text-decoration: none;
                transition: all 0.2s ease-in-out;
            }



            main {
                grid-template-columns: repeat(3, 1fr);
                padding: 35px 30px;
                box-sizing: border-box;
                flex-wrap: wrap;
                gap: 35px;
                width: 80vw;
                margin: 0px auto;
            }

            .heading1 {
                color: #181e2e;
                font-size: 40px;
                text-align: center;
                text-shadow: 0px 5px 10px #dbdbdb;
            }


            #photo-gallery {
                background-image: url(images/photogallery.webp);
            }

            #forms {
                background-image: url(images/foms.webp);
            }

            #table {
                background-image: url(images/tables.webp);
            }

            #list {
                background-image: url(images/list.webp);
            }

            #banner {
                background-image: url(images/banner.webp);
            }

            #iframes {
                background-image: url(images/iframes.webp);
            }

            #media {
                background-image: url(images/media.webp);
            }

            #stack {
                background-image: url(images/media.webp);
            }


            .web-content-card {
                width: 100%;
                background-size: cover;
                background-position: center center;
                background-repeat: no-repeat;
                aspect-ratio: 16/11;
                border-radius: 22px 15px 22px 15px;
                transition: all 0.2s ease-in-out;
            }

            .web-content-card:hover {
                transform: translateY(-5px) scale(1.01);
            }


            .web-content-card h2 {
                margin-bottom: 10px;
                color: white;

            }

            .overlay {
                align-items: end;
                border-radius: 30px 15px 30px 15px;

                width: 100%;
                height: 100%;
                background: linear-gradient(to top, #00000085, #feb47b00);
            }

            .back {
                width: 85%;
                margin: 5px auto;
            }

            #html {
                border-radius: 30px;
                background-color: brown;
                padding: 12px 30px;
            }

            @media (max-width:880px) and (min-width:650px) {

                main a {
                    width: 45%;
                    text-decoration: none;
                }
            }

            @media (max-width:650px) {
                main {
                    width: 90%;
                }

                main a {
                    width: 100%;
                    text-decoration: none;
                }
            }
        </style>

    </head>


    <body>

        <main class="flex">
            <a href="photogallery.html">
                <div class="web-content-card" id="photo-gallery">
                    <div class="overlay flex">

                        <h2>PHOTOGALLERY</h2>
                    </div>
                </div>
            </a>
            <a href="regestration form.html">
                <div class="web-content-card" id="forms">
                    <div class="overlay flex">

                        <h2>FORMS</h2>
                    </div>
                </div>
            </a>
            <a href="table.html">
                <div class="web-content-card" id="table">
                    <div class="overlay flex">

                        <h2>TABLES</h2>
                    </div>
                </div>
            </a>
            <a href="list.html">
                <div class="web-content-card" id="list">
                    <div class="overlay flex">

                        <h2>LISTS</h2>
                    </div>
                </div>
            </a>
            <a href="banner.html">
                <div class="web-content-card" id="banner">
                    <div class="overlay flex">

                        <h2>BANNER</h2>
                    </div>
                </div>
            </a>
            <a href="iframes.html">
                <div class="web-content-card" id="iframes">
                    <div class="overlay flex">

                        <h2>IFRAMES</h2>
                    </div>
                </div>
            </a>
            <a href="media.html">
                <div class="web-content-card" id="media">
                    <div class="overlay flex">

                        <h2>MEDIA</h2>
                    </div>
                </div>
            </a>
            <a href="stack.html">
                <div class="web-content-card" id="stack">
                    <div class="overlay flex">

                        <h2>POSITION</h2>
                    </div>
                </div>
            </a>
        </main>
        <script src="script.js"></script>
        <script>
             const a = document.getElementsByTagName("a");
            for (let i = 0; i < a.length; i++) {
                a[i].target = "_top"
            }
        </script>

    </body>




    </html>
