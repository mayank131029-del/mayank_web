<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Generator</title>
    <link rel="stylesheet" href="style.css">

    <style>
        main {
            border: 2px solid black;
            border-radius: 10px;
            gap: 15px;
            flex-direction: column;
            width: 80%;
            margin: 20px auto;
            padding: 8px;
        }

        .table_container {
            color: #3a3a6a;
            background-color: azure;
            text-align: center;
            border-radius: 15px;
        }

        #h {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            padding: 10px;
            border-radius: 15px;
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
            color: #e0e1dd;
        }

        #generate {

            border: none;
            padding: 8px 22px;
            background: #ff3e7f;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        #generate:hover {
            background: #e62f6d;
            transform: translateY(-3px);
        }
    </style>



</head>

<a href="#top">
    <div class="back2top"></div>
</a>
<header>

    </header>


<body>
    <div class="back"><a href="web_development.html"> &larrhk; back</a></div>

    <main class="flex">

        <div id="h">Table Generator with JS
        </div>
        <div class="table_container" id="table_container"></div>
        <button id="generate">Generate Table</button>
    </main>




    <script>
        var a = document.getElementById("h")
        var b = document.getElementById("table_container")
        var c = document.getElementById("generate")

        let number
        c.addEventListener("click", () => {
            b.innerHTML = ""
            number = prompt("Enter the Number: ", "1")
            a.innerText = "Table of " + number

            for (let i = 1; i <= 10; i++) {
                b.innerHTML += "<h3>" + number + " x " + i + "= " + i * number + "</h3>"

            }
        })

        document.title = "dfdf"
    </script>


</body>



<footer></footer>
<script src="script.js"></script>

</html>
