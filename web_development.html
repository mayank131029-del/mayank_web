        <style>
            * {
                margin: 0px;
                padding: 0px;
                font-family: poppins;
            }



            html {
                overflow-x: hidden;
                background: #e0e1dd;
            }

            .syne-font {
                color: #0d1b2a;
                font-family: 'Syne', sans-serif;
            }

            main a {
                width: 30%;
                text-decoration: none;
                transition: all 0.2s ease-in-out;
            }

            #my-work{
			 border-bottom: 2px solid white;
		}


            main {
                grid-template-columns: repeat(3, 1fr);
                padding: 50px 30px;
                box-sizing: border-box;
                flex-wrap: wrap;
                gap: 35px;
                width: 80vw;
                margin: 0px auto;
            }

            .heading1 {
                color: #181e2e;
                font-size: 40px;
                text-align: center;
            }


            #alert {
                background-image: url(images/alert&prompt.webp);

            #POPUP {
                background-image: url(images/popup.webp);
            }

            #calculator {
                background-image: url(images/functions.webp);
            }

            #colorchange {
                background-image: url(images/random.webp);
            }

            #table_generator {
                background-image: url(images/for\ loop.webp);
            }

            #clock {
                background-image: url(images/age_calculator.webp);
            }

            #age_calculator {
                background-image: url(images/age_calculator.webp);
            }


            .web-content-card {
                width: 100%;
                background-size: cover;
                background-position: center center;
                background-repeat: no-repeat;
                aspect-ratio: 16/11;
                border-radius: 22px 15px 22px 15px;
                transition: all 0.2s ease-in-out;
            }

            .web-content-card:hover {
                transform: translateY(-5px) scale(1.01);
            }


            .web-content-card h2 {
                margin-bottom: 10px;
                color: white;

            }

            .overlay {
                align-items: end;
                border-radius: 30px 15px 30px 15px;

                width: 100%;
                height: 100%;
                background: linear-gradient(to top, #00000085, #feb47b00);
            }

            .back {
                width: 85%;
                margin: 5px auto;
            }



            #js,
            #html,
            #projects {
                color: white;
                cursor: pointer;
                border-radius: 30px;
                /* background-color: bown; */
                padding: 12px 30px;
            }
            
            .jspage {
                width: 100vw;
                height: 80vh;
                overflow-x: hidden;
            }
            
            
            .activetab {
             
                color: white;
                background: brown;
            }

            @media (max-width:880px) and (min-width:650px) {

                main a {
                    width: 45%;
                    text-decoration: none;
                }
            }
            
            @media (max-width:650px) {
                
                .heading1{
                    margin: auto;
                    text-align: center;
                    width: 85%;
                    font-size: 35px;
                }
                main {
                    width: 90%;
                }

                main a {
                    width: 100%;
                    text-decoration: none;
                }
            }

        <iframe class="jspage" id="frame" src="html_pages.html" frameborder="0"></iframe>


        


        <script>

            let frame = document.getElementById("frame")
           let savedPage = localStorage.getItem("activePage"); 
            let heading = document.querySelector(".heading1")

            let html = document.getElementById("html")
            let js = document.getElementById("js")



            if (savedPage) {
                frame.src = savedPage;
            } else {
                frame.src = "html_pages.html";
            }


            if (savedPage === "html_pages.html") {
                html.classList.add("activetab");
            }
            if (savedPage === "js_page.html") {
                js.classList.add("activetab");
            }

            html.addEventListener("click", () => {
                heading.innerHTML = "HTML + CSS Practice Work"
                frame.src = "html_pages.html"
                localStorage.setItem("activePage", "html_pages.html")
            })
            js.addEventListener("click", () => {
                heading.innerHTML = "JavaSricpt Practice Work"
                frame.src = "js_page.html"
                localStorage.setItem("activePage", "js_page.html")
            })

            let menu = [html, js]

            menu.forEach(item => {
                item.addEventListener("click", () => {
                    menu.forEach(tab => {
                        tab.classList.remove("activetab")
                    })
                    item.classList.add("activetab")

                })

            })

          


            document.title ="fdhfhi"
            console.log(localStorage.getItem("activePage"))

        </script>
