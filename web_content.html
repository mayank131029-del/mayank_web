                <style>
                        * {
                                margin: 0px;
                                padding: 0px;
                                font-family: poppins;
                        }



                        html {
                                background: #e0e1dd;
                        }

                        .syne-font {
                                color: #0d1b2a;
                                font-family: 'Syne', sans-serif;
                        }

                        main a {
                                width: 30%;
                                text-decoration: none;
                        }

                        main {
                                grid-template-columns: repeat(3, 1fr);
                                padding: 50px 30px;
                                box-sizing: border-box;
                                flex-wrap: wrap;
                                gap: 25px;
                                width: 100vw;
                                margin: 0px auto;
                        }

                        .heading {
                                margin-top: 30px;
                                color: #181e2e;
                                font-size: 40px;
                                text-align: center;

                        #photo-gallery {

                        #forms {

                        }

                        #table {
                                background-image: url(images/tables.png);
                        }

                        #list {
                                background-image: url(images/list.png);
                        }
                        #banner {
                                background-image: url(images/banner.png);
                        }


                        .web-content-card {
                                width: 100%;
                                background-size: cover;
                                background-position: center center;
                                background-repeat: no-repeat;
                                aspect-ratio: 16/11;
                                border-radius: 30px 15px 30px 15px;
                                transition: all 0.2s ease-in-out;
                        }

                        .web-content-card:hover {
                                transform: translateY(-10px) scale(1.02);
                        }


                        .web-content-card h2 {
                                margin-bottom: 10px;
                                color: white;

                        }

                        .overlay {
                                align-items: end;
                                border-radius: 30px 15px 30px 15px;

                                width: 100%;
                                height: 100%;
                                background: linear-gradient(to top, #00000085, #feb47b00);
                        }

                        .back {
                                width: 85%;
                                margin: auto;
                        }

                        @media (max-width:880px) and (min-width:650px) {

                                main a {
                                        width: 45%;
                                        text-decoration: none;
                                }
                        }

                        @media (max-width:650px) {
                                main a {
                                        width: 90%;
                                        text-decoration: none;
                                }
                        }
                </style>
