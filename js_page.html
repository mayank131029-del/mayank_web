<! doctype html>
    <html>


    <head>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Web Content</title>
        <link rel="stylesheet" href="style.css">
        <style>
            * {
                margin: 0px;
                padding: 0px;
                font-family: poppins;
            }



            html {
                /* overflow: hidden; */
                background: #e0e1dd;
            }

            .syne-font {
                color: #0d1b2a;
                font-family: 'Syne', sans-serif;
            }

            main a {
                width: 30%;
                text-decoration: none;
                transition: all 0.2s ease-in-out;
            }



            main {
                grid-template-columns: repeat(3, 1fr);
                padding: 50px 30px;
                box-sizing: border-box;
                flex-wrap: wrap;
                gap: 35px;
                width: 80vw;
                margin: 0px auto;
            }

            .heading1 {
                color: #181e2e;
                font-size: 40px;
                text-align: center;
            }


            #alert {
                background-image: url(images/alert&prompt.webp);
            }

            #POPUP {
                background-image: url(images/popup.webp);
            }

            #calculator {
                background-image: url(images/functions.webp);
            }

            #colorchange {
                background-image: url(images/random.webp);
            }

            #table_generator {
                background-image: url(images/for\ loop.webp);
            }

            #clock {
                background-image: url(images/age_calculator.webp);
            }

            #age_calculator {
                background-image: url(images/age_calculator.webp);
            }
            #image_slider {
                background-image: url(images/image_slider.webp);
            }
            #expense_tracker {
                background-image: url(images/expense_tracker.webp);
            }
            #timeoutpopup {
                background-image: url(images/timeoutpopup.webp);
            }
            #passvalidation {
                background-image: url(images/pass_validation.webp);
            }


            .web-content-card {
                width: 100%;
                background-size: cover;
                background-position: center center;
                background-repeat: no-repeat;
                aspect-ratio: 16/11;
                border-radius: 22px 15px 22px 15px;
                transition: all 0.2s ease-in-out;
            }

            .web-content-card:hover {
                transform: translateY(-5px) scale(1.01);
            }


            .web-content-card h2 {
                text-align: center;
                margin-bottom: 10px;
                color: white;

            }

            .overlay {
                align-items: end;
                border-radius: 30px 15px 30px 15px;

                width: 100%;
                height: 100%;
                background: linear-gradient(to top, #00000085, #feb47b00);
            }

            .back {
                width: 85%;
                margin: 5px auto;
            }



            #js {
                border-radius: 30px;
                background-color: brown;
                padding: 12px 30px;
            }

            @media (max-width:880px) and (min-width:650px) {

                main a {
                    width: 45%;
                    text-decoration: none;
                }
            }

            @media (max-width:650px) {
                main {
                    width: 90%;
                }

                main a {
                    width: 100%;
                    text-decoration: none;
                }
            }
        </style>

    </head>


    <body>
       


        <main class="flex">
            <a href="alert.html">
                <div class="web-content-card" id="alert">
                    <div class="overlay flex">

                        <h2>ALERT & PROMPT</h2>
                    </div>
                </div>
            </a>
            <a href="popup.html">
                <div class="web-content-card" id="popup">
                    <div class="overlay flex">

                        <h2>OVERLAY POPUP</h2>
                    </div>
                </div>
            </a>
            <a href="calculator.html">
                <div class="web-content-card" id="calculator">
                    <div class="overlay flex">

                        <h2>FUNCTION ()</h2>
                    </div>
                </div>
            </a>
            <a href="random_color.html">
                <div class="web-content-card" id="colorchange">
                    <div class="overlay flex">

                        <h2>RANDOM No.</h2>
                    </div>
                </div>
            </a>
            <a href="table_generator.html">
                <div class="web-content-card" id="table_generator">
                    <div class="overlay flex">

                        <h2>LOOPS</h2>
                    </div>
                </div>
            </a>
            <a href="time&date.html">
                <div class="web-content-card" id="clock">
                    <div class="overlay flex">

                        <h2>DATE()</h2>
                    </div>
                </div>
            </a>
            <a href="age_calculator.html">
                <div class="web-content-card" id="age_calculator">
                    <div class="overlay flex">

                        <h2>AGE CALCULATOR</h2>
                    </div>
                </div>
            </a>
            <a href="image_slider.html">
                <div class="web-content-card" id="image_slider">
                    <div class="overlay flex">

                        <h2>IMAGE SLIDER</h2>
                    </div>
                </div>
            </a>
            <a href="expense_tracker.html">
                <div class="web-content-card" id="expense_tracker">
                    <div class="overlay flex">

                        <h2>EXPENSE TRACKER</h2>
                    </div>
                </div>
            </a>
            <a href="timeoutpopup.html">
                <div class="web-content-card" id="timeoutpopup">
                    <div class="overlay flex">

                        <h2>TIMEOUT POPUP</h2>
                    </div>
                </div>
            </a>
            <a href="password validation.html">
                <div class="web-content-card" id="passvalidation">
                    <div class="overlay flex">

                        <h2>PASSWORD VALIDATION</h2>
                    </div>
                </div>
            </a>

        </main>
        <script src="script.js"></script>

        <script>
            const a = document.getElementsByTagName("a");
            for (let i = 0; i < a.length; i++) {
                a[i].target = "_top"
            }
        </script>

    </body>


    </html>
