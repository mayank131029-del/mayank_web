            <div class="radios">
                <input type="radio" name="radio" class="radio">
                <input type="radio" name="radio" class="radio">
                <input type="radio" name="radio" class="radio">

<footer></footer>

<script>

let images = [
    "images/banner1.webp",
    "images/banner2.webp",
    "images/banner3.webp",
    "images/banner4.webp",
    "images/banner5.webp",
]
let count = 0
let img = document.getElementById("img")
let radio = document.querySelectorAll(".radio")

// function load(){
//    t = setInterval(() => {
//         img.src = images[count]
//         radio[count].checked = true
//         count++
//         if (count==images.length) {
//             count = 0
//         }
//     }, 1000);
// }



// recursive funtion

function load(){
   t = setTimeout(() => {
        img.src = images[count]
        radio[count].checked = true
        count++
        if (count==images.length) {
            count = 0
        }
        load()
    }, 1000);
}

load()

radio.forEach((element, index)=>{
    element.addEventListener("click", ()=>{
        clearInterval(t)
        count = index
         img.src = images[count]
        console.log(count);
        setTimeout(() => {
            load()
        }, 2000);
        
    })
    
})


</script>
