<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Am-Draw</title>
    <link rel="stylesheet" href="style.css">
    <style>
        div{
            display: flex;
        }
        .erase-circle {
            background-color: white;
        }

        .btn,
        .btn1 {
            width: 100%;
            padding: 5px 8px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            background: #ffffff;
            color: #333;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s ease;
        }

        .btn:hover {
            background: #f3f4f6;
            border-color: #9ca3af;
        }

        .btn1:hover {
            background: #f3f4f6;
            border-color: #9ca3af;

        }

        input[type="color"] {
            width: 100%;
            height: 25px;
            padding: 4px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            transition: all .25s ease;
        }

        input[type="color"]:hover {
            border-color: #2563eb;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(37, 99, 235, .2);
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 8px;
        }

        input[type="color"]::-moz-color-swatch {
            border: none;
            border-radius: 8px;
        }

        .btn.active {
            height: 100%;
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
            box-shadow: 0 8px 20px rgba(37, 99, 235, .3);
            transform: translateY(-2px);
        }
        .ep{
            align-items: center;
        }
        main {
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        canvas {
            width: 85%;
            height: 100%;
            border-radius: 15px;
            border: 5px solid rgb(173, 173, 173);
            cursor: none;
        }
        
        .tools {
            gap: 15px;
            padding: 15px;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 15%;
            height: 100%;
            border-radius: 15px;
            border: 5px solid rgb(173, 173, 173);

        }

        .tools div {
            width: 100%;
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        .tools>div{
            flex-direction: column;
        }

        .circle {
            border: 1px solid black;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            position: absolute;
            display: none;
            z-index: 999;
            pointer-events: none;
        }

        .sc {
            align-self: baseline;
            flex-direction: column;
        }

        code {
            border: 1px solid rgb(196, 196, 196);
            padding: 2px 5px;
            border-radius: 5px;
        }

        .sc div {
            display: flex;
            /* justify-content: center; */
            align-items: center;
        }
         @media (max-width:650px) {
            main{
                height: inherit;
                flex-direction: column;
            }
            .tools{
                width: 100%;
                order: 2;
            }
            canvas{
                width: 100%;
                height: 70vh;
            }
        }
    </style>
</head>
<header></header>

<body>

    <div class="circle" id="circle"></div>
    <main>
        <div class="tools flex">
            <div>
                <div class="color">
                    <label for="picker" id="color-lable">Color:</label>
                    <input type="color" name="" id="picker" value="#000000" placeholder="" title="Color">
                </div>
                <div class="width">
                    <label id="width-label" for="width"></label>
                    <input type="range" name="" id="width" min="1" max="50" title="width" value="5">
                </div>
                <div class="ep">
                    <input class="btn active" id="pen" type="button" value="Pen">
                    <input class="btn" id="clear" type="button" value="Eraser">
                </div>
                <div>
                    <input id="clr-cnvs" class="btn1" type="button" value="Clear Canvas">
                </div>
                <div>
                    <input id="save" class="btn1" type="button" value="Save Art">
                </div>
            </div>
            <div class="sc">
                <div><h2>Shortcut Keys</h2></div>
                <div>Increase Width <code>+</code> </div>
                <div>Decrase Width <code>-</code> </div>
                <div>Switch Tool <code>0</code> </div>
                <div>Clear Canvas <code>Del</code> </div>
                <div>Save Artwork <code>s</code> </div>

            </div>
        </div>
        <canvas id="canva"></canvas>
    </main>

</body>


<footer></footer>
<script src="script.js"></script>
<script>


    let tool = "Pen"
    let save = document.getElementById("save")
    let clr_cnvs = document.getElementById("clr-cnvs")
    let btns = document.querySelectorAll(".btn")
    let erase = document.getElementById("clear")
    let circle = document.getElementById("circle")
    let width = document.getElementById("width")
    let picker = document.getElementById("picker")
    let canvas = document.getElementById("canva")
    let width_label = document.getElementById("width-label")
    let color = picker.value
    let penwidth = Number(width.value)
    let x, y
    let lastx, lasty
    let drawing = false;


    width_label.innerHTML = `Width: ${penwidth}px`
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    width.addEventListener("input", () => {
        penwidth = width.value
        width_label.innerHTML = `Width: ${penwidth}px`
        console.log(penwidth)
    })

    picker.addEventListener("input", () => {
        color = picker.value
    })

    canvas.addEventListener("mousedown", (e) => {
        drawing = true;
        lastx = e.offsetX;
        lasty = e.offsetY;
    });
    canvas.addEventListener("mouseup", () => {
        drawing = false;
    });
    canvas.addEventListener("mouseleave", () => {
        circle.style.display = "none"
        drawing = false;
    });

    
    function setTool(toolName) {
        tool = toolName;
        
        btns.forEach((btn) => {
            btn.classList.toggle("active", btn.value === toolName);
        });
    }
    
    let ctx = canvas.getContext("2d");
    function draw() {
        ctx.beginPath();

        ctx.moveTo(lastx, lasty);
        ctx.lineTo(x, y);

        ctx.lineWidth = penwidth * 2;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        if (tool === "Pen") {

            ctx.globalCompositeOperation = "source-over"
            ctx.strokeStyle = color;
            circle.classList.remove("erase-circle")
        }
        else {
            ctx.globalCompositeOperation = "destination-out"

        }

        ctx.stroke();
        lastx = x;
        lasty = y;
        ctx.fillStyle = color;
        ctx.arc(x, y, penwidth, 0, 2 * Math.PI);
        ctx.fill();
    }



    canvas.addEventListener("mousemove", (e) => {
        circle.style.display = "block";

        circle.style.width = `${penwidth * 2}px`
        circle.style.height = `${penwidth * 2}px`

        circle.style.top = `${e.pageY - penwidth}px`
        circle.style.left = `${e.pageX - penwidth}px`

        circle.style.backgroundColor = color
        if (tool === "Eraser") {
            circle.style.backgroundColor = "white"
        }

        if (!drawing) return;
        x = e.offsetX;
        y = e.offsetY;
        draw(e);
    });

    btns.forEach((b) => {

        b.addEventListener("click", (e) => {
            setTool(b.value)
        })

    })


    clr_cnvs.addEventListener("click", () => {
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight)
    })


    document.addEventListener("keydown", (e) => {
        if ((e.key == "+") && (penwidth <= 49)) {
            penwidth++
            width.value = penwidth;
            width_label.textContent = `Width: ${penwidth}px`;
        }
        if ((e.key == "-") && (penwidth >= 2)) {
            penwidth--
            width.value = penwidth;
            width_label.textContent = `Width: ${penwidth}px`;

        }
        if (e.key === "0") {
            setTool(tool === "Pen" ? "Eraser" : "Pen")
            // console.log(tool);
        }
        if (e.key === "Delete") {
            ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight)
        }
        if (e.key === "s") {
            save.click()
        }
        // console.log(e.key)
    })


    save.addEventListener("click",()=>{
        const file = document.createElement("a")
        file.download = "downlaod.png"
        file.href = canvas.toDataURL("image/png")
        file.click()
    })
    // console.log(canvas);
    
</script>

</html>
