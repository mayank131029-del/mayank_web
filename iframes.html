<style>



h1 {
  text-align: center;
  background: black;
  color: #fff;
  padding: 15px;
}

.container {
  display: flex;
  height: 80vh;
}

.sidebar {
  width: 220px;
  background: #222;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.sidebar a {
  color: white;
  text-decoration: none;
  margin-bottom: 12px;
  padding: 10px;
  background: #444;
  border-radius: 6px;
  transition: 0.3s;
}

.sidebar a:hover {
  background: #ff3e7f;
}

.content {
  flex: 1;
  padding: 10px;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 10px;
}


@media (max-width: 880px) and (min-width: 650px) {

  .sidebar {
    width: 180px;
    padding: 15px;
  }

  .sidebar a {
    font-size: 14px;
    padding: 9px;
  }

  .content {
    padding: 8px;
  }

  iframe {
    height: 70vh;
  }
}


@media (max-width: 650px) {
  h1 {
    font-size: 22px;
    padding: 12px;
  }

  .container {
    flex-direction: column;
    height: auto;
  }

  .sidebar {
    width: 100%;
    padding: 15px;
  }

  .sidebar a {
    margin-bottom: 10px;
    font-size: 14px;
    text-align: center;
  }

  .content {
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
  }

  iframe {
    height: 60vh;
  }
}
</style>
