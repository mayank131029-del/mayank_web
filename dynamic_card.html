    <link rel="stylesheet" href="style.css">

    <style>
        main {
            border: 2px solid black;
            border-radius: 10px;
            gap: 15px;
            flex-direction: column;
            width: 80%;
            margin: 20px auto;
            padding: 8px;
        }

        input {
            border-radius: 5px;
        }

        .input_box {
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        .input_line {
            display: flex;
            gap: 10px;
            justify-content: left;
        }

        #add {

            border: none;
            padding: 4px 22px;
            background: #ff3e7f;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        #add:hover {
            background: #e62f6d;
            transform: translateY(-3px);
        }

        .card_box {
            flex-direction: column;
            padding: 20px 0;
            border: 2px solid black;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .cards {
            justify-content: space-between;
            gap: 20px;
            padding: 10px;
            border-radius: 15px;
            border: 3px solid pink;
            width: 90%;
        }

        .content {
            flex-direction: column;
            gap: 8px;
        }

        .thumbnail {
            border-radius: 3px;
            background-image: url(images/banner1.webp);
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            width: 35%;
            height: 150px;
        }

        #content_heading {
            font-size: 18px;
        }

        #content_description {
            font-size: 10px;
        }

        .info span {
            margin: 0 20px 0 0;
            font-weight: 600;
        }
    </style>



</head>

<body>
    <div class="back"><a href="javascript_content.html"> &larrhk; back</a></div>

    <main class="flex">

        <div class="input_box flex">
            <div class="input_line">
                <label for="headingi">Enter Heading</label><input id="headingi" type="text">
            </div>
            <div class="input_line">
                <label for="descritptioni">Enter Description</label><input id="descritptioni" type="text">
            </div>
            <div class="input_line">
                <label for="thumbnaili">Select Thumbnail</label><input id="thumbnaili" type="file">
            </div>
            <input type="submit" id="add" value="Generate Card">
        </div>

    </main>

    <div class="card_box flex">
        <div class="cards flex">
            <div class="thumbnail" id="thumbnail"></div>
            <div class="content flex">
                <h1 id="content_heading">How to create a Thumbnail in Photoshop | Photoshop Manipulation</h1>
                <p id="content_descriptioni">Lore ipsum accusamus natus perferendis officiis.</p>
                <div class="info">
                    <span id="time">2:00</span>
                    <span id="day">21/10</span>
                </div>
            </div>
        </div>
    </div>


    <script>
        let heading = document.querySelector("#headingi")
        heading = heading.value
        let descritption = document.querySelector("#descritptioni")
        descritption = descritption.value
        let thumbnail = document.querySelector("#thumbnaili")
        let thumbnail_img = document.querySelector("#thumbnail")
        let button = document.querySelector("#add")

        thumbnail.addEventListener("change", function () {

            let url = URL.createObjectURL(this.files[0])

            thumbnail_img.style.backgroundImage = "url(" + url + ")"

            console.log(url)
        })

        button.addEventListener("click", ()=>{

            let oldcard = document.getElementsByClassName("cards")[0]
            let newcard = oldcard.cloneNode(true)

            let bigbox = document.getElementsByClassName("card_box")[0]
            bigbox.appendChild(newcard)


        })


    </script>
