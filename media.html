<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Page</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0f172a;
            color: #fff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            background: #111827;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 75%;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        video,
        audio {
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
        }

        .card h2 {
            margin-bottom: 10px;
            color: #38bdf8;
        }

        .back a {
            color: white;
        }

        .back {
            margin-top: 20px;
        }

        @media (max-width: 650px) {
            .card {
                width: 95%;
            }

        }
    </style>
</head>

<body>

    <a href="#top">
        <div class="back2top"></div>
    </a>
    <header>

    </header>
    <div class="back"><a href="web_development.html"> &larrhk; back</a></div>
    <h1>HTML Media Practice</h1>

    <div class="container">
        <div class="card">
            <h2>Video Player</h2>
            <video controls autoplay muted loop>
                <source src="media/v1.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="card">
            <h2>Audio Player</h2>
            <audio controls autoplay>
                <source src="media/a1.mp3" type="audio/mpeg">
                Your browser does not support the audio tag.
            </audio>
        </div>

    </div>
    <script src="script.js"></script>
</body>
<footer></footer>

</html>
