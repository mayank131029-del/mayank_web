<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .calculator_box table {
            border-spacing: 20px;
        }

        .calculator_box {
            margin: 25px auto;
            background-color: rgb(218, 238, 255);
            width: 95%;
            border-radius: 25px;
            padding: 20px;
            flex-direction: column;
            align-items: center;
        }

        input,
        button {
            padding: 2px 5px;
            border-radius: 5px;
            border: 1px solid rgba(0, 0, 0, 0.363);
        }

        #rst,
        #resultbtn {
            width: 45%;
        }
    </style>



</head>

<a href="#top">
    <div class="back2top"></div>
</a>
<header>

</header>


<body>
    <div class="back"><a href="web_development.html"> &larrhk; back</a></div>
    <div class="calculator_box flex">
        <div>
            <h4 id="result">Your Result is: </h4>
        </div>
        <form action="">
            <table>
                <tr>
                    <td><label for="num1">Enter First Number</label></td>
                    <td><input id="num1" type="number" placeholder="Enter number"></td>
                </tr>
                <tr>
                    <td><label for="op">Enter the operator</label></td>
                    <td><input id="op" type="text" placeholder="+ / - *"></td>
                </tr>
                <tr>
                    <td><label for="num2">Enter Second Number</label></td>
                    <td><input id="num2" type="number" placeholder="Enter number"></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input id="rst" type="reset">
                        <button id="resultbtn" type="button">GO</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>


    <script>

        var num1 = document.getElementById("num1")
        var num2 = document.getElementById("num2")
        var op = document.getElementById("op")
        var resultbtn = document.getElementById("resultbtn")
        var result = document.getElementById("result")

        resultbtn.onclick = calc

        let ans
        function calc() {

            let a = parseInt(num1.value)
            let b = parseInt(num2.value)
            let operator = op.value


            if (operator == '+') {
                ans = a + b
            }

            else if (operator == '-') {
                ans = a - b
            }

            else if (operator == '*') {
                ans = a * b
            }

            else if (operator == '/') {
                ans = a / b
            }

            else {
                ans = "Invalid input"
            }
            result.innerText = "Your Result is: " + ans
        }
    </script>

</body>



<footer></footer>
<script src="script.js"></script>

</html>
