<body>
    <div class="back"><a href="javascript_content.html"> &larrhk; back</a></div>
    <div class="calculator_box flex">
        <div>
            <h4 id="result">Your Result is: </h4>
        </div>
        <form action="">
            <table>
                <tr>
                    <td><label for="num1">Enter First Number</label></td>
                    <td><input id="num1" type="number" placeholder="Enter number"></td>
                </tr>
                <tr>
                    <td><label for="op">Enter the operator</label></td>
                    <td><input id="op" type="text" placeholder="+ / - *"></td>
                </tr>
                <tr>
                    <td><label for="num2">Enter Second Number</label></td>
                    <td><input id="num2" type="number" placeholder="Enter number"></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input id="rst" type="reset">
                        <button id="resultbtn" type="button">GO</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>
    <script src="script.js"></script>

    <script>

        var num1 = document.getElementById("num1")
        var num2 = document.getElementById("num2")
        var op = document.getElementById("op")
        var resultbtn = document.getElementById("resultbtn")
        var result = document.getElementById("result")

        resultbtn.onclick = calc

        let ans
        function calc() {

            let a = parseInt(num1.value)
            let b = parseInt(num2.value)
            let operator = op.value


            if (operator == '+') {
                ans = a + b
            }

            else if (operator == '-') {
                ans = a - b
            }

            else if (operator == '*') {
                ans = a * b
            }

            else if (operator == '/') {
                ans = a / b
            }

            else {
                ans = "Invalid input"
            }
            result.innerText = "Your Result is: "+ ans
        }
    </script>
