<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Generator</title>
    <link rel="stylesheet" href="style.css">

    <style>
        main {
            
            border: 2px solid black;
            text-align: center;
            border-radius: 10px;
            gap: 20px;
            flex-direction: column;
            width: 80%;
            margin: 20vh auto;
            padding: 20px;
        }

        #calculate {
            width: 35%;
            margin-top: 20px;
            border: none;
            padding: 4px 22px;
            background: #ff3e7f;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        #calculate:hover {
            background: #e62f6d;
            transform: translateY(-3px);
        }

        main h2 {
            background: linear-gradient(45deg, #1e1e2f, #3a3a6a);
            color: white;
            padding: 5px;
            border-radius: 10px;

        }

        label {
            margin-right: 15px;
        }

        input {
            padding: 2px 8px;
            border-radius: 5px;
        }
    </style>



</head>

<a href="#top">
    <div class="back2top"></div>
</a>
<header>

</header>


<body>
    <div class="back"><a href="web_development.html"> &larrhk; back</a></div>

    <main class="flex">
        <h2>Age calculator</h2>
        <div>
            <form action="">
                <div>
                    <label for="age">Enter your Date of Birth</label>
                    <input type="date" id="age">
                </div>
                <input type="button" value="Calculate" id="calculate">
                <input type="reset">
            </form>
        </div>
        <h3 id="result_line">Your Age will be shown here</h3>
    </main>




    <script>
        let calculate = document.getElementById("calculate")
        let rl = document.getElementById("result_line")
        let input = document.getElementById("age")
        let td = new Date()

        function age_calculator() {
            let dob = new Date(input.value)
            let result = td.getFullYear() - dob.getFullYear()

            if (
                dob.getMonth() > td.getMonth() ||
                (dob.getMonth() === td.getMonth() &&
                    dob.getDate() > td.getDate())

            ) {


                result--;

            }

            console.log()
            if (result > 18) {
                rl.innerText = "You are " + result + " year's old and eligible for Driving."

            }
            else {
                rl.innerText = "You are " + result + " year's old and not eligible for Driving."

            }
        }


        calculate.addEventListener("click", () => {

            if (input.value !== "") {

                age_calculator()
            }
            else {
                alert("Please Enter your DOB First")


            }



        })




    </script>


</body>

</html>
