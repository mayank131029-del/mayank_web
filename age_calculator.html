<body>
    <div class="back"><a href="javascript_content.html"> &larrhk; back</a></div>

    <main class="flex">
        <h2>Age calculator</h2>
        <div>
            <form action="">
            <div>
                <label for="age">Enter your Date of Birth</label>
                <input type="date" id="age">
            </div>
            <input type="button" value="Calculate" id="calculate">
            <input type="reset">
            </form>
        </div>
        <h3 id="result_line">Your Age will be shown here</h3>
    </main>




    <script>
        let calculate = document.getElementById("calculate")
        let rl = document.getElementById("result_line")
        let input = document.getElementById("age")
        let td = new Date()

        function age_calculator() {
            let dob = new Date(input.value)
            let result = td.getFullYear() - dob.getFullYear()

            if (
                dob.getMonth() > td.getMonth() ||
                (dob.getMonth() === td.getMonth() &&
                    dob.getDate() > td.getDate())

            ) {


                result--;

            }

            console.log()
            if (result > 18) {
                rl.innerText = "You are " + result + " year's old and eligible for Driving."

            }
            else {
                rl.innerText = "You are " + result + " year's old and not eligible for Driving."

            }
        }


        calculate.addEventListener("click", () => {

            if (input.value !== "") {
                
                age_calculator()
            }
            else {
                alert("Please Enter your DOB First")
                

            }



        })




    </script>

    <script src="script.js"></script>

</body>
