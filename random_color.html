<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert</title>
    <link rel="stylesheet" href="style.css">

    <style>
        main {
            align-items: center;
            gap: 25px;
            display: flex;
            flex-direction: column;
            padding: 40px;
        }

        .color {

            border: 2px solid rgb(0, 0, 0);
            width: 50%;
            height: 250px;
            border-radius: 25px;
        }

        #cngclr {
            padding: 10px 25px;
            border-radius: 5px;
        }

        #cngclr {

            border: none;
            padding: 12px 22px;
            background: #ff3e7f;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        #cngclr:hover {
            background: #e62f6d;
            transform: translateY(-3px);
        }
    </style>



</head>

<a href="#top">
    <div class="back2top"></div>
</a>
<header>

    </header>


<body>
    <div class="back"><a href="web_development.html"> &larrhk; back</a></div>

    <main>
        <div class="color" id="color">

        </div>
        <input id="cngclr" type="button" value="Change Color">
    </main>



    <script>

        var box = document.getElementById("color")
        var btn = document.getElementById("cngclr")

        function colorchange() {
            var r = Math.round(Math.random() * 255)
            var g = Math.round(Math.random() * 255)
            var b = Math.round(Math.random() * 255)

            // alert var rgb = "rgb("+r+","+g+","+b+")"


            box.style.background = "rgb(" + r + "," + g + "," + b + ")"


        }

        btn.onclick = colorchange

    </script>

</body>



<footer></footer>
    <script src="script.js"></script>
</html>
