<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert</title>
    <link rel="stylesheet" href="style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #e0e1dd;
        }

        .popup_box {
            top: 0px;
            position: fixed;
            z-index: 99999;
            align-items: center;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            background-color: #636363bd;
        }

        .popup {
            flex-direction: column;
            background: rgb(233, 225, 255);
            width: 40%;
            gap: 25px;
            padding: 35px 50px 50px 50px;
            border-radius: 18px;
        }


        .popup_content {
            gap: 10px;
            flex-direction: column;
            align-items: center;
        }

        .popup p {
            cursor: pointer;
            font-size: 19px;
            text-align: right;
        }

        .popup_content h5 {
            font-size: 25px;
            text-align: center;
        }

        .popup_content h1 {
            text-align: center;
            font-size: 55px;
            font-weight: 700;
            color: #26263f;
        }

        .buttons button {

            border: none;
            padding: 12px 22px;
            background: #ff3e7f;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .buttons button:hover {
            background: #e62f6d;
            transform: translateY(-3px);
        }

        .buttons {
            gap: 10px;
        }

        .hide_popup {
            display: none;
        }
        .bg img{
            width: 100%;
        }
        @media (max-width:650px) {

            .buttons {
                flex-direction: column;
            }

            .popup {
                width: 90%;
            }
        }
    </style>



</head>

        })
